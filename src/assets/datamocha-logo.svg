<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
  </defs>
  <!-- Outer circle -->
  <circle cx="32" cy="32" r="29" stroke="url(#gold)" stroke-width="2.5" fill="none"/>
  <!-- Cup body -->
  <path d="M16 30 C16 30 15 48 19 50 C23 52 39 52 43 50 C47 48 46 30 46 30 Z" fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
  <!-- Cup handle -->
  <path d="M46 34 C52 34 53 40 51 43 C49 46 46 45 46 44" fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
  <!-- Bar chart inside cup -->
  <rect x="21" y="42" width="4" height="6" rx="0.5" fill="url(#gold)"/>
  <rect x="27" y="39" width="4" height="9" rx="0.5" fill="url(#gold)"/>
  <rect x="33" y="36" width="4" height="12" rx="0.5" fill="url(#gold)"/>
  <!-- Rising arrow (steam + chart line) -->
  <polyline points="20,28 26,24 32,26 38,18" stroke="url(#gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow tip -->
  <polyline points="34,16 38,18 36,22" stroke="url(#gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Steam curve -->
  <path d="M28,20 C30,14 34,16 32,12" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" fill="none"/>
</svg>
